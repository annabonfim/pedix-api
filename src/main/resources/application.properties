# ========================================
# Application
# ========================================
spring.application.name=pedix-api

# ========================================
#  Database - Oracle (Docker Compose)
# ========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@oracle.fiap.com.br:1521/ORCL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:rm559561}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:200702}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ========================================
# Connection Pool (HikariCP)
# ========================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ========================================
# JPA / Hibernate
# ========================================
# O banco Oracle do Docker Compose inicia vazio.
# 'update' permite ao Hibernate criar automaticamente as tabelas no schema do usu\uFFFDrio.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Hibernate 6.x usa OracleDialect (detecta automaticamente a versão do Oracle)
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

spring.sql.init.mode=never

# ========================================
# Logging SQL (opcional, para debug)
# ========================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ========================================
# Swagger / OpenAPI
# ========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ========================================
# Server
# ========================================
server.port=8080